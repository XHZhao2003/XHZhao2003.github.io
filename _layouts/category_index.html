---
layout: default
---

<h1> {{ page.title }}</h1>

<ul>
  {% assign posts = site.posts | where: "category", page.category | sort: 'order' %}
  {% for post in posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
    <span> {% if post.order %} {% endif %} </span>
    </li>
  {% endfor %}
</ul>
